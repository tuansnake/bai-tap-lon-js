<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân - PTIT GAME</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

    <div class="profile-container">
        <a href="trangchu.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Trang chủ
        </a>

        <div class="profile-header">
            <h2>HỒ SƠ <span>MẠNG XÃ HỘI</span></h2>
            
            <div class="avatar-wrapper">
                <img src="https://i.pinimg.com/originals/c6/e5/65/c6e56503cfdd87da299f72dc416023d4.jpg" alt="User Avatar" class="avatar-large" id="profileAvatar">
                <div class="change-avatar-icon" id="changeAvatarBtn" title="Đổi ảnh đại diện">
                    <i class="fa-solid fa-camera"></i>
                </div>
            </div>
            
            <div class="user-name">Nguyễn Văn A</div>
            <div class="user-role">Gamer / Reviewer</div>
        </div>

        <div class="profile-info-list">
            <div class="info-item">
                <span class="info-label"><i class="fa-solid fa-id-card"></i> Số điện thoại:</span>
                <span class="info-value">0123456789</span>
            </div>
            <div class="info-item">
                <span class="info-label"><i class="fa-solid fa-envelope"></i> Email:</span>
                <span class="info-value">anv.b26cn001@student.ptit.edu.vn</span>
            </div>
            <div class="info-item">
                <span class="info-label"><i class="fa-solid fa-comments"></i> Số bài review:</span>
                <span class="info-value">12 bài viết</span>
            </div>
            <div class="info-item">
                <span class="info-label"><i class="fa-solid fa-star"></i> Điểm uy tín:</span>
                <span class="info-value" style="color: #ffb703;"><i class="fa-solid fa-star"></i> 4.9/5</span>
            </div>
        </div>

        <button class="btn-edit-profile" id="editProfileBtn">Chỉnh sửa thông tin</button>
    </div>

    <script src="../js/profile.js"></script>
</body>
</html>
